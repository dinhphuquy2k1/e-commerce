version: "3.8"
services:
  backend:
    image: backend_image
    container_name: backend
    build: "./backend"
    volumes:
      - ./:/app/backend
    command: python3 backend/manage.py runserver 0.0.0.0:8000
    networks:
      - django-nginx
    ports:
      - "8000:8000"
  frontend:
    image: frontend_image
    container_name: frontend
    build: "./frontend"
    volumes:
      - ./:/app/frontend
    ports:
      - "8080:8080"
    command: npm --prefix frontend run serve
    depends_on:
      - backend
    networks:
      - django-nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf:ro
      - django-static:/usr/src/app/static
    networks:
      - django-nginx

volumes:
  django-static:

networks:
  django-nginx:
    driver: bridge